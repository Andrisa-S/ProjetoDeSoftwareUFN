<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
  <h1 class="mb-4">Lista</h1>
  <table class="table table-bordered table-hover">
    <thead class="table-dark">
      <tr>
        <th scope="col">Id</th>
        <th scope="col">Nome</th>
        <th scope="col">Descrição</th>
        <th scope="col">Valor</th>
        <th scope="col">Quantidade</th>
        <th scope="col">Categoria</th>
        <th scope="col">Imagem</th>
        <th scope="col">Editar</th>
        <th scope="col">Excluir</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="produto : ${produtos}">
        <td th:text="${produto.id}"></td>
        <td th:text="${produto.nome}"></td>
        <td th:text="${produto.descricao}"></td>
        <td th:text="${produto.valor}"></td>
        <td th:text="${produto.quantidade}"></td>
        <td th:text="${produto.categoria != null ? produto.categoria.nome : 'Sem categoria'}"></td>
        <td><img th:src="${produto.imagem}" style="width: 100px"></td>
        <td><a type="button" th:href="@{/produto/editar/{id}(id=${produto.id})}">Editar</a></td>
        <td><a th:href="@{/produto/deletar/{id}(id=${produto.id})}">Excluir</a></td>
      </tr>
    </tbody>
  </table>

  <a href="/produto/formulario" class="btn btn-success">Novo Item</a>
</body>
</html>
