<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista</title>
</head>
<body>
  <h1>Lista</h1>
  <table class="table table-bordered" border="1">
    <thead class="thead-dark">
      <tr>
        <th scope="col">Id</th>
        <th scope="col">Nome</th>
        <th scope="col">Descrição</th>
        <th scope="col">Valor</th>
        <th scope="col">Quantidade</th>
        <th scope="col">Imagem</th>
        <th scope="col">Editar</th>
        <th scope="col">Excluir</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="produto : ${produtos}">
        <td th:text="${produto.id}"></td>
        <td th:text="${produto.nome}"></td>
        <td th:text="${produto.descricao}"></td>
        <td th:text="${produto.valor}"></td>
        <td th:text="${produto.quantidade}"></td>
        <td><img th:src="${produto.imagem}" style="width: 100px"></td>
        <td><a type="button" th:href="@{/produto/editar/{id}(id=${produto.id})}">Editar</a></td>
        <td><a th:href="@{/produto/deletar/{id}(id=${produto.id})}">Excluir</a></td>
      </tr>
    </tbody>
  </table>

  <a href="/produto/formulario">Novo Item</a>
</body>
</html>
